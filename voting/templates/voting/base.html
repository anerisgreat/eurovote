<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Eurovision Vote{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d1a;
      color: #e8e8f0;
      min-height: 100vh;
    }

    nav {
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav a { color: #a0a0c0; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #fff; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #fff; }

    .container {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.3rem; margin-bottom: 1rem; color: #c0c0e0; }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-secondary { background: #2a2a4a; color: #e0e0f0; }
    .btn-lg { padding: 0.9rem 2rem; font-size: 1.1rem; }

    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #1e1e36;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      color: #e8e8f0;
      font-size: 1rem;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #6c63ff;
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
      color: #a0a0c0;
    }

    .messages { margin-bottom: 1rem; }
    .messages li {
      list-style: none;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      background: #2a2a4a;
      margin-bottom: 0.4rem;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 0.6rem 0.8rem;
      border-bottom: 2px solid #2a2a4a;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8080a0;
    }
    td {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid #1e1e36;
      font-size: 0.95rem;
    }
    tr:hover td { background: #1a1a30; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">Eurovision Vote</a>
    <div>
      {% if user.is_authenticated %}
        <span style="color:#8080a0;margin-right:1rem;">{{ user.username }}</span>
        <a href="{% url 'logout' %}">Log out</a>
      {% else %}
        <a href="{% url 'login' %}">Log in</a>
      {% endif %}
    </div>
  </nav>

  <div class="container">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
